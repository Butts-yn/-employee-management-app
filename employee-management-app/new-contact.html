<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="main.js">
    </script>
     <div class="sidebar">
         <div class="profile-area">
            <img src="images/profile.png">
                 <p><b>RYAN BUTURU</b></p>
          
    </div>
     <ul class="nav-links">
            <li><a href="index.html"> Home</a></li>
              <li><a href="new-contact.html">New Contact</a></li>
             <li><a href="view-contact.html">View All Contacts</a></li>
         </ul>
 </div>
    <div class="main-content">
       <div class="form-container">
        <h2>Add New Contact</h2><br>
    
        <form>

    <div class="form-group">
        ID  Number:<input type="text" placeholder="Enter Identification Number"><br>
         </div>
    <div class="form-group">
        
    Firstname:<input type="text" placeholder="Enter First Name"><br>
    </div>
     <div class="form-group">

     Lastname:<input type="text" placeholder="Enter Last Name"><br>
    </div>
    <div class="form-group">

     Gender:<input type="radio" name=gender value="male">male<input type="radio" name=gender value="female">female<br>
     </div>
    
     <div class="form-group">

      Phone:<input type="tel" placeholder="+254---"><br>
      </div>
     <div class="form-group">

     Email:<input type="email" placeholder="Enter Email"><br>
    </div>
     <div class="form-group">

     Department:<input type="text" placeholder="Enter Departrment"><br>
     </div>
    
     <div class="form-group">

      Address:<input type="text" placeholder="Enter Address"><br>
      </div>
     <div class="form-group">

     Date of Birth:<input type="date" value="mm/dd/yyyy"><br>
     </div>
     <div class="form-group">
        Position:
        <select>
        <option>- Select Position if Official -</option>
        <option>manager</option>
        <option>secretary</option>
        <option>receptionist</option>
        <option>technician</option>
        
    </select><br>
    </div>
     <button type="submit" class="button-details">SUBMIT</button>
    
                           </form>
                    </div>
                </div>
            
</body>
</html>
